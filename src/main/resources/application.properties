spring.application.name=project_name_here

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Origin Patterns Allowed - In List
app.cors.allowed-origins=${CORS_ORIGINS_ALLOWED}

# JWT Configuration
jwt.token.secret.key=${JWT_SECRET}
jwt.token.access.token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.token.refresh.token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION}

# Logging Configuration - Where to save the log file and file size
logging.file.name=${LOGGING_PATH_PLUS_FILENAME:logs/auth-system.log}
logging.logback.rollingpolicy.max-file-size=${LOGGING_MAX_FILE_SIZE}
logging.logback.rollingpolicy.total-size-cap=${LOGGING_TOTAL_SIZE_CAP}
logging.logback.rollingpolicy.max-history=${LOGGING_MAX_HISTORY}

# Mail Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URL
app.frontend.url=${FRONTEND_URL}

# Oauth 2 Configuration - Currently Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH2_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH2_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_OAUTH2_CLIENT_SCOPE}